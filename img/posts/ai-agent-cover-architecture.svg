<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent Architecture Overview</title>
  <desc id="desc">A custom cover diagram showing personality, memory, emotion and autonomy around an AI agent core and backend infrastructure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#081120"/>
      <stop offset="55%" stop-color="#11233b"/>
      <stop offset="100%" stop-color="#1d3557"/>
    </linearGradient>
    <linearGradient id="core" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7bdff2"/>
      <stop offset="100%" stop-color="#48bfe3"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffb703"/>
      <stop offset="100%" stop-color="#fb8500"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" x2="1">
      <stop offset="0%" stop-color="#90be6d"/>
      <stop offset="100%" stop-color="#43aa8b"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" x2="1">
      <stop offset="0%" stop-color="#f28482"/>
      <stop offset="100%" stop-color="#e76f51"/>
    </linearGradient>
    <linearGradient id="accent4" x1="0" x2="1">
      <stop offset="0%" stop-color="#cdb4db"/>
      <stop offset="100%" stop-color="#a2d2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#02060d" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 56px 'SF Pro Display', 'Segoe UI', Arial, sans-serif; fill: #f8fbff; letter-spacing: 0.5px; }
      .subtitle { font: 400 24px 'SF Pro Text', 'Segoe UI', Arial, sans-serif; fill: #d8e6f4; }
      .cardTitle { font: 700 28px 'SF Pro Display', 'Segoe UI', Arial, sans-serif; fill: #f8fbff; }
      .cardBody { font: 400 18px 'SF Pro Text', 'Segoe UI', Arial, sans-serif; fill: #dce8f5; }
      .small { font: 600 20px 'SF Pro Text', 'Segoe UI', Arial, sans-serif; fill: #f4f8fc; letter-spacing: 1px; }
      .infra { font: 600 22px 'SF Pro Text', 'Segoe UI', Arial, sans-serif; fill: #e9f0f8; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1290" cy="160" r="220" fill="#1e4c78" opacity="0.12"/>
  <circle cx="260" cy="780" r="260" fill="#7bdff2" opacity="0.07"/>
  <circle cx="1450" cy="760" r="180" fill="#ffb703" opacity="0.05"/>

  <text x="120" y="120" class="title">How AI Agents Become Persistent Digital Entities</text>
  <text x="120" y="165" class="subtitle">Personality, Memory, Emotion and Autonomy are backend architecture problems.</text>

  <g filter="url(#shadow)">
    <rect x="580" y="250" rx="40" ry="40" width="440" height="250" fill="url(#core)" opacity="0.95"/>
    <text x="800" y="345" text-anchor="middle" class="cardTitle" fill="#07253b">AI AGENT CORE</text>
    <text x="800" y="390" text-anchor="middle" class="cardBody" fill="#0a2f49">Identity Assembly</text>
    <text x="800" y="425" text-anchor="middle" class="cardBody" fill="#0a2f49">State + Reasoning Loop</text>
    <text x="800" y="460" text-anchor="middle" class="cardBody" fill="#0a2f49">Tool Execution + Governance</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="270" rx="28" ry="28" width="300" height="160" fill="url(#accent1)"/>
    <text x="160" y="330" class="cardTitle">PERSONALITY</text>
    <text x="160" y="370" class="cardBody">Modular prompts</text>
    <text x="160" y="400" class="cardBody">role files + boundaries</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1180" y="270" rx="28" ry="28" width="300" height="160" fill="url(#accent2)"/>
    <text x="1220" y="330" class="cardTitle">MEMORY</text>
    <text x="1220" y="370" class="cardBody">core / recall / archive</text>
    <text x="1220" y="400" class="cardBody">vector + graph traces</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="240" y="560" rx="28" ry="28" width="300" height="160" fill="url(#accent3)"/>
    <text x="280" y="620" class="cardTitle">EMOTION</text>
    <text x="280" y="660" class="cardBody">valence + arousal</text>
    <text x="280" y="690" class="cardBody">decay + prompt shaping</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1060" y="560" rx="28" ry="28" width="300" height="160" fill="url(#accent4)"/>
    <text x="1100" y="620" class="cardTitle">AUTONOMY</text>
    <text x="1100" y="660" class="cardBody">events + scoring + loops</text>
    <text x="1100" y="690" class="cardBody">HITL + multi-agent flow</text>
  </g>

  <path d="M420 350 C500 350, 520 350, 580 360" fill="none" stroke="#ffd27a" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <path d="M1020 360 C1080 350, 1120 350, 1180 350" fill="none" stroke="#74d6a5" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <path d="M540 640 C620 620, 650 565, 650 500" fill="none" stroke="#f6a5a0" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <path d="M1060 640 C980 620, 950 565, 950 500" fill="none" stroke="#c6d9ff" stroke-width="6" stroke-linecap="round" opacity="0.9"/>

  <g filter="url(#shadow)">
    <rect x="260" y="770" rx="26" ry="26" width="1080" height="78" fill="#0d1b2a" opacity="0.96"/>
    <text x="800" y="820" text-anchor="middle" class="infra">BACKEND SUBSTRATE: Redis · PostgreSQL · Vector DB · Graph DB · Queue · Model Serving · GPU Runtime</text>
  </g>

  <text x="121" y="200" class="small">ARCHITECTURE MAP</text>
</svg>
