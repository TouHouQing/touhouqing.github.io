<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Autonomy Event Loop</title>
  <desc id="desc">An event driven autonomy loop diagram for AI agents including triggers, queue, planner, tools, scoring and human approval.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#081a1f"/>
      <stop offset="100%" stop-color="#13313a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.26"/>
    </filter>
    <style>
      .title { font: 700 48px 'SF Pro Display', 'Segoe UI', Arial, sans-serif; fill: #f8fbff; }
      .sub { font: 400 22px 'SF Pro Text', 'Segoe UI', Arial, sans-serif; fill: #d6e5ee; }
      .nodeTitle { font: 700 24px 'SF Pro Display', 'Segoe UI', Arial, sans-serif; fill: #fff; }
      .body { font: 400 18px 'SF Pro Text', 'Segoe UI', Arial, sans-serif; fill: #eef7fb; }
    </style>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <text x="90" y="90" class="title">Autonomy Comes From Event Loops, Not Chat Boxes</text>
  <text x="90" y="130" class="sub">A production agent wakes up on events, scores them, decides, acts, records, and loops.</text>

  <g filter="url(#shadow)">
    <rect x="90" y="250" width="250" height="170" rx="26" fill="#2a9d8f"/>
    <text x="125" y="305" class="nodeTitle">TRIGGERS</text>
    <text x="125" y="340" class="body">user message</text>
    <text x="125" y="368" class="body">webhook / monitor</text>
    <text x="125" y="396" class="body">cron / business update</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="400" y="250" width="220" height="170" rx="26" fill="#457b9d"/>
    <text x="435" y="305" class="nodeTitle">EVENT BUS</text>
    <text x="435" y="340" class="body">Kafka</text>
    <text x="435" y="368" class="body">Redis Streams</text>
    <text x="435" y="396" class="body">RabbitMQ</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="680" y="215" width="300" height="240" rx="30" fill="#e76f51"/>
    <text x="715" y="275" class="nodeTitle">AGENT LOOP</text>
    <text x="715" y="315" class="body">observe</text>
    <text x="715" y="345" class="body">reason</text>
    <text x="715" y="375" class="body">plan / ReAct</text>
    <text x="715" y="405" class="body">act</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1040" y="250" width="260" height="170" rx="26" fill="#8ecae6"/>
    <text x="1075" y="305" class="nodeTitle" fill="#103145">TOOLS</text>
    <text x="1075" y="340" class="body" fill="#103145">search / CRM / mail</text>
    <text x="1075" y="368" class="body" fill="#103145">calendar / database</text>
    <text x="1075" y="396" class="body" fill="#103145">internal APIs</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="360" y="560" width="300" height="160" rx="26" fill="#ffb703"/>
    <text x="395" y="620" class="nodeTitle" fill="#362500">SCORING</text>
    <text x="395" y="655" class="body" fill="#362500">priority</text>
    <text x="395" y="682" class="body" fill="#362500">risk</text>
    <text x="395" y="709" class="body" fill="#362500">worth acting now?</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="760" y="560" width="300" height="160" rx="26" fill="#cdb4db"/>
    <text x="795" y="620" class="nodeTitle" fill="#33203f">HUMAN GATE</text>
    <text x="795" y="655" class="body" fill="#33203f">approve</text>
    <text x="795" y="682" class="body" fill="#33203f">escalate</text>
    <text x="795" y="709" class="body" fill="#33203f">handoff</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1120" y="560" width="200" height="160" rx="26" fill="#90be6d"/>
    <text x="1155" y="620" class="nodeTitle" fill="#18310c">MEMORY</text>
    <text x="1155" y="655" class="body" fill="#18310c">state</text>
    <text x="1155" y="682" class="body" fill="#18310c">audit</text>
    <text x="1155" y="709" class="body" fill="#18310c">reflection</text>
  </g>

  <path d="M340 335 L400 335" stroke="#d5e6ee" stroke-width="6" stroke-linecap="round"/>
  <path d="M620 335 L680 335" stroke="#d5e6ee" stroke-width="6" stroke-linecap="round"/>
  <path d="M980 335 L1040 335" stroke="#d5e6ee" stroke-width="6" stroke-linecap="round"/>
  <path d="M830 455 L830 560" stroke="#d5e6ee" stroke-width="6" stroke-linecap="round"/>
  <path d="M680 640 L660 640" stroke="#d5e6ee" stroke-width="6" stroke-linecap="round"/>
  <path d="M1060 640 L1120 640" stroke="#d5e6ee" stroke-width="6" stroke-linecap="round"/>
  <path d="M1220 560 L1220 470 C1220 430, 1180 420, 1140 420 L1040 420" stroke="#d5e6ee" stroke-width="6" fill="none" stroke-linecap="round"/>
</svg>
