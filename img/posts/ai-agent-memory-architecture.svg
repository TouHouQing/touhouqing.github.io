<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Layered Memory Architecture</title>
  <desc id="desc">A layered memory diagram for AI agents showing core memory, recall memory, archival memory and reasoning traces.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1320"/>
      <stop offset="100%" stop-color="#172a46"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#02060d" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 700 48px 'SF Pro Display', 'Segoe UI', Arial, sans-serif; fill: #f8fbff; }
      .sub { font: 400 22px 'SF Pro Text', 'Segoe UI', Arial, sans-serif; fill: #d4e1ee; }
      .layerTitle { font: 700 30px 'SF Pro Display', 'Segoe UI', Arial, sans-serif; fill: #f8fbff; }
      .body { font: 400 18px 'SF Pro Text', 'Segoe UI', Arial, sans-serif; fill: #ecf4fb; }
      .label { font: 600 18px 'SF Pro Text', 'Segoe UI', Arial, sans-serif; fill: #dce8f5; letter-spacing: 1px; }
    </style>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <text x="90" y="90" class="title">Layered Memory for Persistent Agents</text>
  <text x="90" y="130" class="sub">What keeps personality stable is not the LLM alone, but how memory is tiered and recalled.</text>

  <g filter="url(#shadow)">
    <rect x="130" y="180" width="1140" height="120" rx="28" fill="#4cc9f0"/>
    <text x="170" y="235" class="layerTitle" fill="#0a2236">1. CORE MEMORY</text>
    <text x="170" y="270" class="body" fill="#0a2236">Current identity, active task, recent dialogue, immediate constraints.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="180" y="335" width="1040" height="120" rx="28" fill="#90be6d"/>
    <text x="220" y="390" class="layerTitle" fill="#11280c">2. RECALL MEMORY</text>
    <text x="220" y="425" class="body" fill="#11280c">Semantic retrieval from vector search, similar episodes, user preferences.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="230" y="490" width="940" height="120" rx="28" fill="#f9c74f"/>
    <text x="270" y="545" class="layerTitle" fill="#392903">3. ARCHIVAL MEMORY</text>
    <text x="270" y="580" class="body" fill="#392903">Long-term facts, relationship history, cold storage, summarized experiences.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="280" y="645" width="840" height="120" rx="28" fill="#f28482"/>
    <text x="320" y="700" class="layerTitle" fill="#3d0c0b">4. REASONING TRACES</text>
    <text x="320" y="735" class="body" fill="#3d0c0b">Decision chains, tool calls, success/failure outcomes, reflection material.</text>
  </g>

  <path d="M700 300 L700 335" stroke="#d7e6f5" stroke-width="6" stroke-linecap="round"/>
  <path d="M700 455 L700 490" stroke="#d7e6f5" stroke-width="6" stroke-linecap="round"/>
  <path d="M700 610 L700 645" stroke="#d7e6f5" stroke-width="6" stroke-linecap="round"/>

  <text x="1110" y="234" class="label">HOT</text>
  <text x="1070" y="390" class="label">WARM</text>
  <text x="1030" y="545" class="label">COLD</text>
  <text x="990" y="700" class="label">REFLECTIVE</text>
</svg>
